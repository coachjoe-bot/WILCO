<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#04060c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WILCO" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fonts load async (media=print → all on load): the stylesheet fetch no longer
         blocks first paint on a just-woken radio. display=swap covers the swap-in. -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,600&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,600&display=swap" /></noscript>
    <title>WILCO</title>
    <!-- Critical inline CSS: the app's real styles are injected by React, so without
         this the page canvas is WHITE until the whole JS bundle parses. Painting the
         night-gym navy + a skeleton here makes the shell appear instantly; React
         replaces #root's children on mount. -->
    <style>
      html,body{background:#04060c;margin:0}
      #root{min-height:100vh;background:#04060c}
      .boot{min-height:100vh;padding:calc(env(safe-area-inset-top,0px) + 18px) 16px 16px;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
      .boot-brand{color:#22d3ee;font-size:22px;font-weight:800;letter-spacing:3px;margin-bottom:14px;animation:bootPulse 1.4s ease-in-out infinite}
      .boot-bar{border-radius:8px;background:linear-gradient(100deg,#0a1226 40%,#12203f 50%,#0a1226 60%);background-size:200% 100%;animation:bootShimmer 1.5s linear infinite}
      .boot-pills{display:flex;gap:8px;margin-bottom:22px}
      .boot-pills .boot-bar{height:30px;flex:1;border-radius:9px}
      .boot-msg{max-width:78%;height:64px;margin-bottom:14px;border-radius:15px 15px 15px 4px;border:1px solid rgba(120,150,210,.14)}
      .boot-msg.r{margin-left:auto;height:38px;border-radius:15px 15px 4px 15px}
      @keyframes bootShimmer{to{background-position:-200% 0}}
      @keyframes bootPulse{0%,100%{opacity:1}50%{opacity:.55}}
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Boot skeleton: replaced the moment React mounts -->
      <div class="boot">
        <div class="boot-brand">WILCO</div>
        <div class="boot-pills"><div class="boot-bar"></div><div class="boot-bar"></div><div class="boot-bar"></div><div class="boot-bar"></div></div>
        <div class="boot-bar boot-msg"></div>
        <div class="boot-bar boot-msg r"></div>
        <div class="boot-bar boot-msg" style="height:88px"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Service worker is registered ONLY on the canonical production host. Stale
      // installs on old Vercel aliases (e.g. fortis-ten.vercel.app) kept a cached
      // SW phoning home and polluting the error feed; here any non-canonical origin
      // self-destructs instead — unregister every SW + drop its caches so the next
      // navigation falls through to the vercel.json redirect to app.trainwilco.com.
      // localhost/127.0.0.1 (dev) is left untouched so local PWA testing still works.
      (function () {
        if (!('serviceWorker' in navigator)) return;
        var host = location.hostname;
        var isCanonical = host === 'app.trainwilco.com';
        var isDev = host === 'localhost' || host === '127.0.0.1';
        if (isCanonical) {
          window.addEventListener('load', function () {
            navigator.serviceWorker.register('/sw.js');
          });
        } else if (!isDev) {
          navigator.serviceWorker.getRegistrations()
            .then(function (rs) { rs.forEach(function (r) { r.unregister(); }); })
            .catch(function () {});
          if (window.caches && caches.keys) {
            caches.keys()
              .then(function (ks) { ks.forEach(function (k) { caches.delete(k); }); })
              .catch(function () {});
          }
        }
      })();
    </script>
  </body>
</html>
