<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#04060c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WILCO" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,600&display=swap" />
    <title>WILCO</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Service worker is registered ONLY on the canonical production host. Stale
      // installs on old Vercel aliases (e.g. fortis-ten.vercel.app) kept a cached
      // SW phoning home and polluting the error feed; here any non-canonical origin
      // self-destructs instead — unregister every SW + drop its caches so the next
      // navigation falls through to the vercel.json redirect to app.trainwilco.com.
      // localhost/127.0.0.1 (dev) is left untouched so local PWA testing still works.
      (function () {
        if (!('serviceWorker' in navigator)) return;
        var host = location.hostname;
        var isCanonical = host === 'app.trainwilco.com';
        var isDev = host === 'localhost' || host === '127.0.0.1';
        if (isCanonical) {
          window.addEventListener('load', function () {
            navigator.serviceWorker.register('/sw.js');
          });
        } else if (!isDev) {
          navigator.serviceWorker.getRegistrations()
            .then(function (rs) { rs.forEach(function (r) { r.unregister(); }); })
            .catch(function () {});
          if (window.caches && caches.keys) {
            caches.keys()
              .then(function (ks) { ks.forEach(function (k) { caches.delete(k); }); })
              .catch(function () {});
          }
        }
      })();
    </script>
  </body>
</html>
