    <title>WILCO</title>
    <!-- Critical inline CSS: the app's real styles are injected by React, so without
         this the page canvas is WHITE until the whole JS bundle parses. Painting the
         night-gym navy + a skeleton here makes the shell appear instantly; React
         replaces #root's children on mount. -->
    <style>
      html,body{background:#04060c;margin:0}
      #root{min-height:100vh;background:#04060c}
      .boot{min-height:100vh;padding:calc(env(safe-area-inset-top,0px) + 18px) 16px 16px;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
      .boot-brand{color:#22d3ee;font-size:22px;font-weight:800;letter-spacing:3px;margin-bottom:14px;animation:bootPulse 1.4s ease-in-out infinite}
      .boot-bar{border-radius:8px;background:linear-gradient(100deg,#0a1226 40%,#12203f 50%,#0a1226 60%);background-size:200% 100%;animation:bootShimmer 1.5s linear infinite}
      .boot-pills{display:flex;gap:8px;margin-bottom:22px}
      .boot-pills .boot-bar{height:30px;flex:1;border-radius:9px}
      .boot-msg{max-width:78%;height:64px;margin-bottom:14px;border-radius:15px 15px 15px 4px;border:1px solid rgba(120,150,210,.14)}
      .boot-msg.r{margin-left:auto;height:38px;border-radius:15px 15px 4px 15px}
      /* Coach-shaped skeleton: a headline bar + a stack of card outlines, echoing the
         coach dashboard's layout instead of the athlete chat shape. */
      .boot-head{height:34px;border-radius:8px;margin-bottom:20px}
      .boot-cards{display:flex;flex-direction:column;gap:12px}
      .boot-card{height:72px;border-radius:14px;border:1px solid rgba(120,150,210,.14)}
      /* Neutral splash: no persisted session (or an expired one) is about to land on
         the login screen, not a dashboard — so this shows ONLY the wordmark on the
         night ground, nothing that promises content that isn't coming. */
      .boot-splash{min-height:100vh;display:flex;align-items:center;justify-content:center}
      .boot-splash .boot-brand{margin:0}
      @keyframes bootShimmer{to{background-position:-200% 0}}
      @keyframes bootPulse{0%,100%{opacity:1}50%{opacity:.55}}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Boot skeleton gate: runs synchronously before React (and before first paint,
      // since it's inline and #root has no content yet), so the very first thing a
      // reopen shows already matches where the app is actually headed.
      //
      // Without this, EVERY cold load — including a logged-OUT user about to see the
      // Athlete/Coach Login home screen — got the athlete chat-shaped skeleton (stat
      // pills + chat bubbles), a fake dashboard promise the boot then yanked away.
      //
      // Mirrors the exact persisted-session read + expiry check src/App.jsx uses to
      // restore a session on boot (AUTH_SESSION_KEY="wilco_auth_v1", restoreAuthSession()):
      // a rolling 3h-inactivity trust window AND an unexpired token, both required, or
      // the session is treated as gone. Keep these two in sync if that logic changes.
      (function () {
        var root = document.getElementById("root");
        var SPLASH = '<div class="boot boot-splash"><div class="boot-brand">WILCO</div></div>';
        try {
          var AUTH_KEY = "wilco_auth_v1";
          var raw = localStorage.getItem(AUTH_KEY);
          var s = raw ? JSON.parse(raw) : null;
          var tokenExpMs = 0;
          if (s && s.token) {
            var parts = String(s.token).split(".");
            tokenExpMs = parts.length >= 4 ? (Number(parts[3]) || 0) : 0;
          }
          var now = Date.now();
          var valid = !!(s && s.token && s.record && now <= (s.trustedUntil || 0) && now <= tokenExpMs);
          if (valid && s.role === "athlete") {
            root.innerHTML =
              '<div class="boot">' +
                '<div class="boot-brand">WILCO</div>' +
                '<div class="boot-pills"><div class="boot-bar"></div><div class="boot-bar"></div><div class="boot-bar"></div><div class="boot-bar"></div></div>' +
                '<div class="boot-bar boot-msg"></div>' +
                '<div class="boot-bar boot-msg r"></div>' +
                '<div class="boot-bar boot-msg" style="height:88px"></div>' +
              '</div>';
          } else if (valid && s.role === "coach") {
            root.innerHTML =
              '<div class="boot">' +
                '<div class="boot-brand">WILCO</div>' +
                '<div class="boot-bar boot-head"></div>' +
                '<div class="boot-cards"><div class="boot-bar boot-card"></div><div class="boot-bar boot-card"></div><div class="boot-bar boot-card"></div></div>' +
              '</div>';
          } else {
            root.innerHTML = SPLASH;
          }
        } catch (e) {
          // localStorage unavailable (private mode, disabled, etc.) — fail to the
          // neutral splash rather than assume a session that can't be verified.
          root.innerHTML = SPLASH;
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Service worker is registered ONLY on the canonical production host. Stale
      // installs on old Vercel aliases (e.g. fortis-ten.vercel.app) kept a cached
      // SW phoning home and polluting the error feed; here any non-canonical origin
      // self-destructs instead — unregister every SW + drop its caches so the next
      // navigation falls through to the vercel.json redirect to app.trainwilco.com.
      // localhost/127.0.0.1 (dev) is left untouched so local PWA testing still works.
      (function () {
        if (!('serviceWorker' in navigator)) return;
        var host = location.hostname;
        var isCanonical = host === 'app.trainwilco.com';
        var isDev = host === 'localhost' || host === '127.0.0.1';
        if (isCanonical) {
          window.addEventListener('load', function () {
            navigator.serviceWorker.register('/sw.js');
          });
        } else if (!isDev) {
          navigator.serviceWorker.getRegistrations()
            .then(function (rs) { rs.forEach(function (r) { r.unregister(); }); })
            .catch(function () {});
          if (window.caches && caches.keys) {
            caches.keys()
              .then(function (ks) { ks.forEach(function (k) { caches.delete(k); }); })
              .catch(function () {});
          }
        }
      })();
    </script>
